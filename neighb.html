<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NeighbourHub</title>
</head>
<body>
  <!-- Header -->
  <header>
    <h1>🏘️ NeighbourHub</h1>
    <button>+ List a Service</button>
  </header>
 <!-- Hero Section -->
  <section>
    <h2>Find Local Services</h2>
    <p>Search and book trusted services in your neighbourhood</p>
  </section>
  <!-- Search -->
  <section>
    <input type="text" placeholder="Search services...">
    <select>
      <option>All</option>
      <option>Plumbing</option>
      <option>Electrical</option>
      <option>Tutoring</option>
    </select>
  </section>
  <!-- Services Section -->
  <section>
    <h3>Available Services</h3>
    <div id="services">
      <!-- Cards will come here later -->
    </div>
  </section>
</body>
</html>
